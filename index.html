<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ClinCase – Medical Case Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–navy: #0f2847;
–teal: #1a7a6e;
–teal-lt: #e6f4f2;
–red: #c0392b;
–red-lt: #fdecea;
–gold: #c9973a;
–bg: #f5f3ee;
–card: #fff;
–border: #ddd8ce;
–txt: #1c1c1c;
–muted: #6b6560;
–r: 12px;
}
body.dark {
–bg: #0d1520; –card: #162032; –border: #243447;
–txt: #e8e4db; –muted: #8a9bb0; –navy: #1e3a5f; –teal-lt: #0d2820; –red-lt: #2a1010;
}

body { font-family: ‘DM Sans’, sans-serif; background: var(–bg); color: var(–txt); min-height: 100vh; font-size: 15px; line-height: 1.6; -webkit-tap-highlight-color: transparent; }

/* SCREENS */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* TOPBAR */
.bar { background: var(–navy); color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.bar-title { font-family: ‘Lora’, serif; font-size: 1.05rem; font-weight: 700; }
.bar-sub { font-size: .7rem; opacity: .6; margin-top: 1px; }
.bar-btns { display: flex; gap: 8px; }
.ibtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,.15); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .95rem; }
.ibtn:active { background: rgba(255,255,255,.3); }

/* PROGRESS */
.prog-wrap { background: var(–card); border-bottom: 1px solid var(–border); padding: 10px 16px; }
.prog-row { display: flex; justify-content: space-between; font-size: .72rem; color: var(–muted); margin-bottom: 5px; }
.prog-track { background: var(–border); border-radius: 99px; height: 5px; }
.prog-fill { background: var(–teal); height: 5px; border-radius: 99px; transition: width .3s; }

/* SCROLL CONTENT */
.body { flex: 1; overflow-y: auto; padding: 16px 16px 100px; }

/* BOTTOM BAR */
.foot { position: fixed; bottom: 0; left: 0; right: 0; background: var(–card); border-top: 1px solid var(–border); padding: 12px 16px; display: flex; gap: 10px; z-index: 50; }
.btn { flex: 1; padding: 13px 10px; border-radius: 10px; border: none; font-family: ‘DM Sans’, sans-serif; font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s; -webkit-appearance: none; }
.btn:active { opacity: .8; }
.btn-navy { background: var(–navy); color: #fff; }
.btn-ghost { background: var(–bg); color: var(–txt); border: 1.5px solid var(–border); }
.btn-teal { background: var(–teal); color: #fff; }

/* CARD */
.card { background: var(–card); border: 1px solid var(–border); border-radius: var(–r); padding: 16px; margin-bottom: 14px; }
.card-h { font-family: ‘Lora’, serif; font-size: .95rem; font-weight: 700; color: var(–navy); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
body.dark .card-h { color: #7ab3e0; }

/* FORM FIELDS */
.f { margin-bottom: 13px; }
.f label { display: block; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(–muted); margin-bottom: 4px; }
.f input, .f textarea, .f select { width: 100%; padding: 10px 12px; border: 1.5px solid var(–border); border-radius: 8px; background: var(–bg); color: var(–txt); font-family: ‘DM Sans’, sans-serif; font-size: .9rem; -webkit-appearance: none; appearance: none; }
.f input:focus, .f textarea:focus, .f select:focus { outline: none; border-color: var(–teal); }
.f textarea { resize: vertical; min-height: 80px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* STEP HEADER */
.step-hdr { background: var(–navy); color: #fff; border-radius: var(–r); padding: 16px; margin-bottom: 16px; }
.step-hdr h2 { font-family: ‘Lora’, serif; font-size: 1.05rem; margin-bottom: 3px; }
.step-hdr p { font-size: .75rem; opacity: .65; }

/* CHIPS */
.chip-lbl { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(–muted); margin-bottom: 7px; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
.chip { padding: 6px 12px; border-radius: 99px; font-size: .78rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(–border); background: var(–card); color: var(–txt); user-select: none; transition: all .15s; -webkit-tap-highlight-color: transparent; }
.chip:active { transform: scale(.96); }
.chip.pos { border-color: var(–teal) !important; background: var(–teal-lt) !important; color: var(–teal) !important; font-weight: 600; }
.chip.neg { border-color: var(–red) !important; background: var(–red-lt) !important; color: var(–red) !important; }
.chip.on  { border-color: var(–gold) !important; background: #fef9ee !important; color: var(–gold) !important; font-weight: 600; }
body.dark .chip.on { background: #2a2010 !important; }

/* COMPLAINT ROW */
.cc-row { display: flex; align-items: center; gap: 8px; border: 1px solid var(–border); border-radius: 8px; padding: 9px 12px; margin-bottom: 8px; background: var(–bg); }
.cc-inp { flex: 1; border: none; background: transparent; font-size: .88rem; color: var(–txt); font-family: ‘DM Sans’, sans-serif; }
.cc-inp:focus { outline: none; }
.cc-dur { width: 88px !important; font-size: .8rem !important; text-align: center; flex-shrink: 0; border: none !important; background: transparent !important; }
.cc-dur:focus { outline: none; }
.del-btn { background: none; border: none; color: var(–muted); cursor: pointer; font-size: 1rem; padding: 2px 5px; flex-shrink: 0; }
.del-btn:active { color: var(–red); }

/* ADD BUTTON */
.add-btn { width: 100%; padding: 10px; border: 1.5px dashed var(–teal); border-radius: 8px; background: none; color: var(–teal); font-size: .85rem; font-weight: 600; cursor: pointer; margin-top: 4px; font-family: ‘DM Sans’, sans-serif; }
.add-btn:active { background: var(–teal-lt); }

/* SYS SECTION */
.sys-sec { border: 1px solid var(–border); border-radius: 10px; padding: 14px; margin-bottom: 14px; background: var(–bg); }
.sys-ttl { font-weight: 600; font-size: .88rem; color: var(–navy); margin-bottom: 10px; }
body.dark .sys-ttl { color: #7ab3e0; }

/* NOTE BOX */
.note { font-size: .75rem; color: var(–muted); border-left: 3px solid var(–teal); padding: 7px 11px; border-radius: 0 6px 6px 0; background: var(–bg); margin-bottom: 13px; }

/* HOME SCREEN */
#scr-home { background: var(–navy); position: relative; }
.home-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 24px 24px; text-align: center; color: #fff; }
.home-logo { font-size: 3.8rem; margin-bottom: 14px; }
.home-title { font-family: ‘Lora’, serif; font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
.home-sub { font-size: .88rem; opacity: .65; max-width: 260px; line-height: 1.5; }
.home-inst { font-size: .68rem; opacity: .35; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
.home-ftr { padding: 20px 20px 44px; display: flex; flex-direction: column; gap: 12px; }
.hbtn { padding: 16px 18px; border-radius: 12px; border: none; display: flex; align-items: center; gap: 14px; cursor: pointer; font-family: ‘DM Sans’, sans-serif; text-align: left; width: 100%; }
.hbtn:active { opacity: .85; }
.hbtn-w { background: #fff; color: var(–navy); }
.hbtn-o { background: rgba(255,255,255,.12); color: #fff; border: 1.5px solid rgba(255,255,255,.2); }
.hbtn-icon { font-size: 1.4rem; flex-shrink: 0; }
.hbtn-main { font-size: .97rem; font-weight: 600; }
.hbtn-sub { font-size: .72rem; opacity: .6; margin-top: 1px; font-weight: 400; }
.dark-pill { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.15); border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 1rem; }

/* PATIENT LIST */
.pt-item { display: flex; align-items: center; gap: 12px; background: var(–card); border: 1px solid var(–border); border-radius: 10px; padding: 13px; margin-bottom: 10px; cursor: pointer; }
.pt-item:active { border-color: var(–teal); }
.pt-av { width: 44px; height: 44px; border-radius: 50%; background: var(–navy); color: #fff; display: flex; align-items: center; justify-content: center; font-family: ‘Lora’, serif; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; }
.pt-info { flex: 1; min-width: 0; }
.pt-name { font-weight: 600; font-size: .93rem; }
.pt-meta { font-size: .75rem; color: var(–muted); margin-top: 2px; }
.pt-dx { font-size: .75rem; color: var(–teal); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-acts { display: flex; gap: 4px; flex-shrink: 0; }
.pt-act { background: none; border: none; cursor: pointer; font-size: .95rem; padding: 6px; color: var(–muted); }
.pt-act:active { color: var(–red); }
.empty { text-align: center; padding: 60px 20px; color: var(–muted); }
.empty-ico { font-size: 3rem; margin-bottom: 12px; }
.srch-wrap { position: relative; margin-bottom: 14px; }
.srch-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.srch-wrap input { width: 100%; padding: 10px 12px 10px 36px; border: 1.5px solid var(–border); border-radius: 8px; background: var(–card); color: var(–txt); font-family: ‘DM Sans’, sans-serif; font-size: .9rem; }
.srch-wrap input:focus { outline: none; border-color: var(–teal); }

/* CASE SHEET */
.cs-hdr { text-align: center; padding: 6px 0 16px; border-bottom: 2px solid var(–navy); margin-bottom: 14px; }
.cs-hdr-title { font-family: ‘Lora’, serif; font-size: 1.15rem; font-weight: 700; color: var(–navy); }
body.dark .cs-hdr-title { color: #7ab3e0; }
.cs-hdr-sub { font-size: .7rem; color: var(–muted); margin-top: 2px; }
.cs-sec-title { font-family: ‘Lora’, serif; font-size: .92rem; font-weight: 700; color: var(–navy); border-bottom: 2px solid var(–navy); padding-bottom: 4px; margin-bottom: 10px; }
body.dark .cs-sec-title { color: #7ab3e0; border-color: #7ab3e0; }
.cs-body { font-size: .88rem; line-height: 1.75; }
.cs-body p { margin-bottom: 5px; }
.cs-body ul, .cs-body ol { padding-left: 18px; }
.cs-body li { margin-bottom: 3px; }
.cs-kv { font-size: .85rem; display: inline-block; margin-right: 16px; margin-bottom: 4px; }
.cs-kv b { color: var(–muted); font-weight: 500; }
.fpos { color: var(–teal); font-weight: 500; }
.fneg { color: var(–muted); }
.sys-blk { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(–border); }
.sys-blk:last-child { border-bottom: none; margin-bottom: 0; }
.sys-blk-title { font-weight: 600; font-size: .85rem; margin-bottom: 5px; }
.vtl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.vtl-box { background: var(–bg); border: 1px solid var(–border); border-radius: 8px; padding: 8px 10px; }
.vtl-lbl { font-size: .65rem; color: var(–muted); text-transform: uppercase; letter-spacing: .4px; }
.vtl-val { font-weight: 600; font-size: .88rem; margin-top: 2px; }
.dx-chip-prov { display: inline-block; padding: 3px 11px; border-radius: 99px; font-size: .78rem; margin: 3px; border: 1px solid var(–gold); background: #fef9ee; color: var(–gold); }
body.dark .dx-chip-prov { background: #2a2010; }

/* TOAST */
.toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(8px); background: #1c1c1c; color: #fff; padding: 9px 20px; border-radius: 8px; font-size: .82rem; opacity: 0; transition: all .25s; pointer-events: none; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* PRINT */
@media print {
.bar, .foot, .prog-wrap, .no-print { display: none !important; }
body { background: #fff !important; color: #000 !important; }
.body { padding: 0 !important; }
.card { box-shadow: none !important; border: 1px solid #ccc !important; }
.cs-sec-title, .cs-hdr-title { color: #000 !important; border-color: #000 !important; }
}
</style>

</head>
<body>

<!-- HOME -->

<div id="scr-home" class="screen active">
  <button class="dark-pill" id="dark-btn">🌙</button>
  <div class="home-hero">
    <div class="home-logo">🏥</div>
    <div class="home-title">ClinCase</div>
    <div class="home-sub">Structured clinical case-taking following CMC Ludhiana protocol</div>
    <div class="home-inst">Christian Medical College · Ludhiana</div>
  </div>
  <div class="home-ftr">
    <button class="hbtn hbtn-w" id="btn-new-home">
      <span class="hbtn-icon">📋</span>
      <span><div class="hbtn-main">New Patient</div><div class="hbtn-sub">Start structured case history</div></span>
    </button>
    <button class="hbtn hbtn-o" id="btn-view-home">
      <span class="hbtn-icon">🗂</span>
      <span><div class="hbtn-main">Saved Patients</div><div class="hbtn-sub" id="saved-lbl">0 patients saved</div></span>
    </button>
  </div>
</div>

<!-- PATIENT LIST -->

<div id="scr-list" class="screen">
  <div class="bar">
    <div><div class="bar-title">Saved Patients</div></div>
    <div class="bar-btns">
      <button class="ibtn" id="list-dark-btn">🌙</button>
      <button class="ibtn" id="list-home-btn">🏠</button>
    </div>
  </div>
  <div class="body">
    <div class="srch-wrap">
      <span class="srch-ico">🔍</span>
      <input type="text" id="srch" placeholder="Search by name, diagnosis…"/>
    </div>
    <div id="pt-list"></div>
  </div>
  <div class="foot">
    <button class="btn btn-teal" id="list-new-btn">+ New Patient</button>
  </div>
</div>

<!-- FORM -->

<div id="scr-form" class="screen">
  <div class="bar">
    <div>
      <div class="bar-title" id="form-title">Patient Details</div>
      <div class="bar-sub" id="form-sub">Step 1 of 11</div>
    </div>
    <div class="bar-btns">
      <button class="ibtn" id="form-exit-btn">✕</button>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-row">
      <span id="prog-lbl">Step 1 / 11</span>
      <span id="prog-pct">9%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:9%"></div></div>
  </div>
  <div class="body" id="form-body"></div>
  <div class="foot">
    <button class="btn btn-ghost" id="btn-back">← Back</button>
    <button class="btn btn-navy" id="btn-next">Next →</button>
  </div>
</div>

<!-- CASE VIEW -->

<div id="scr-case" class="screen">
  <div class="bar">
    <div>
      <div class="bar-title">Case Sheet</div>
      <div class="bar-sub" id="case-name-bar"></div>
    </div>
    <div class="bar-btns">
      <button class="ibtn no-print" id="case-print-btn">🖨</button>
      <button class="ibtn no-print" id="case-back-btn">←</button>
    </div>
  </div>
  <div class="body" id="case-body"></div>
  <div class="foot no-print">
    <button class="btn btn-ghost" id="case-back-btn2">← Back</button>
    <button class="btn btn-teal" id="case-print-btn2">🖨 PDF</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
'use strict';

/* ── STATE ── */
var DB = [];
try { DB = JSON.parse(localStorage.getItem('cc_pts') || '[]'); } catch(e) { DB = []; }
var PT = {};
var STEP = 0;
var TOTAL = 11;
var dark = localStorage.getItem('cc_dark') === '1';

/* ── HELPERS ── */
function $(id) { return document.getElementById(id); }
function persist() { try { localStorage.setItem('cc_pts', JSON.stringify(DB)); } catch(e) {} }
function uid() { return 'p' + Date.now() + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return d; }
}
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  var t = $('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}
function opt(arr, sel) {
  return arr.map(function(v) {
    return '<option value="' + esc(v) + '"' + (sel === v ? ' selected' : '') + '>' + esc(v) + '</option>';
  }).join('');
}
function hdrBlock(icon, title, sub) {
  return '<div class="step-hdr"><h2>' + icon + ' ' + title + '</h2><p>' + sub + '</p></div>';
}
function val(id) { var e = $(id); return e ? e.value.trim() : ''; }

/* ── DARK MODE ── */
function applyDark() {
  document.body.classList.toggle('dark', dark);
  var ico = dark ? '☀️' : '🌙';
  ['dark-btn','list-dark-btn'].forEach(function(id) {
    var el = $(id); if (el) el.textContent = ico;
  });
}
applyDark();

function toggleDark() {
  dark = !dark;
  localStorage.setItem('cc_dark', dark ? '1' : '0');
  applyDark();
}

/* ── SCREEN NAVIGATION ── */
function go(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  $(id).classList.add('active');
  if (id === 'scr-list') renderList();
  if (id === 'scr-home') updateHomeLbl();
}

function updateHomeLbl() {
  var n = DB.length;
  $('saved-lbl').textContent = n === 0 ? 'No patients yet' : n === 1 ? '1 patient saved' : n + ' patients saved';
}

/* ── WIRE STATIC BUTTONS ── */
$('dark-btn').addEventListener('click', toggleDark);
$('btn-new-home').addEventListener('click', function() { startNew(); });
$('btn-view-home').addEventListener('click', function() { go('scr-list'); });
$('list-dark-btn').addEventListener('click', toggleDark);
$('list-home-btn').addEventListener('click', function() { go('scr-home'); });
$('list-new-btn').addEventListener('click', function() { startNew(); });
$('form-exit-btn').addEventListener('click', function() {
  if (confirm('Exit form? Unsaved data on this step will be lost.')) go('scr-home');
});
$('btn-back').addEventListener('click', function() { prevStep(); });
$('btn-next').addEventListener('click', function() { nextStep(); });
$('case-print-btn').addEventListener('click', function() { window.print(); });
$('case-print-btn2').addEventListener('click', function() { window.print(); });
$('case-back-btn').addEventListener('click', function() { go('scr-list'); });
$('case-back-btn2').addEventListener('click', function() { go('scr-list'); });
$('srch').addEventListener('input', renderList);

/* ── PATIENT CRUD ── */
function startNew() { PT = {}; STEP = 0; go('scr-form'); renderStep(); }

function editPatient(id) {
  var p = DB.find(function(x) { return x.id === id; });
  if (!p) return;
  PT = JSON.parse(JSON.stringify(p));
  STEP = 0; go('scr-form'); renderStep();
}

function deletePatient(id) {
  if (!confirm('Delete this patient? This cannot be undone.')) return;
  DB = DB.filter(function(x) { return x.id !== id; });
  persist(); renderList(); toast('Patient deleted');
}

function viewPatient(id) {
  var p = DB.find(function(x) { return x.id === id; });
  if (!p) return;
  $('case-name-bar').textContent = (p.name || 'Unknown') + ' · Case Sheet';
  $('case-body').innerHTML = buildCaseSheet(p);
  go('scr-case');
}

/* ── RENDER LIST ── */
function renderList() {
  var q = ($('srch') || {value:''}).value.toLowerCase();
  var filtered = DB.filter(function(p) {
    if (!q) return true;
    var s = (p.name||'') + (p.age||'') + ((p.dx||{}).provisional||'') + ((p.dx||{}).final||'');
    return s.toLowerCase().indexOf(q) >= 0;
  });
  var el = $('pt-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">📂</div><p>' + (q ? 'No match.' : 'No patients saved yet.') + '</p></div>';
    return;
  }
  el.innerHTML = filtered.map(function(p) {
    return '<div class="pt-item" data-id="' + p.id + '">' +
      '<div class="pt-av">' + esc((p.name||'?')[0].toUpperCase()) + '</div>' +
      '<div class="pt-info">' +
        '<div class="pt-name">' + esc(p.name||'Unnamed') + '</div>' +
        '<div class="pt-meta">' + esc([p.age,p.sex,p.occupation].filter(Boolean).join(' · ')) + (p.doa ? ' · Adm: ' + fmtDate(p.doa) : '') + '</div>' +
        '<div class="pt-dx">' + esc((p.dx||{}).provisional || 'No diagnosis recorded') + '</div>' +
      '</div>' +
      '<div class="pt-acts">' +
        '<button class="pt-act" data-edit="' + p.id + '" title="Edit">✏️</button>' +
        '<button class="pt-act" data-del="' + p.id + '" title="Delete">🗑</button>' +
      '</div>' +
    '</div>';
  }).join('');

  el.querySelectorAll('.pt-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      if (e.target.closest('.pt-acts')) return;
      viewPatient(item.dataset.id);
    });
  });
  el.querySelectorAll('[data-edit]').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.stopPropagation(); editPatient(btn.dataset.edit); });
  });
  el.querySelectorAll('[data-del]').forEach(function(btn) {

/* ── RENDER STEP ── */
function renderStep() {
  $('form-title').textContent = STEPS[STEP][0];
  $('form-sub').textContent = 'Step ' + (STEP+1) + ' of ' + TOTAL;
  $('prog-lbl').textContent = 'Step ' + (STEP+1) + ' / ' + TOTAL;
  var pct = Math.round(((STEP+1)/TOTAL)*100);
  $('prog-pct').textContent = pct + '%';
  $('prog-fill').style.width = pct + '%';
  $('btn-back').style.opacity = STEP === 0 ? '0' : '1';
  $('btn-back').style.pointerEvents = STEP === 0 ? 'none' : 'auto';
  $('btn-next').textContent = STEP === TOTAL-1 ? '✓ Save Patient' : 'Next →';
  $('form-body').innerHTML = buildStep(STEP);
  $('form-body').scrollTop = 0;
  wireStepEvents();
}

function toggleSym(key, sym) {
if (!PT.sr) PT.sr = {};
if (!PT.sr[key]) PT.sr[key] = {pos:[],neg:[]};

var ip = d.pos.indexOf(sym)>=0, in_ = d.neg.indexOf(sym)>=0;
if (!ip && !in_) d.pos.push(sym);

var cls=ip2?‘pos’:in2?‘neg’:’’; var b=ip2?’ ✓’:in2?’ ✗’:’’;
return ‘<span class="chip ' + cls + '" data-sys="' + key + '" data-sym="' + esc(s) + '">’ + esc(s) + b + ‘</span>’;
}).join(’’);

function toggleGE(sym) {

var ip=d.pos.indexOf(sym)>=0, in_=d.neg.indexOf(sym)>=0;

else if (ip) { d.pos=d.pos.filter(function(x){return x!==sym;}); d.neg.push(sym); }
else d.neg=d.neg.filter(function(x){return x!==sym;});
var wrap = document.getElementById(‘ge-chips’);
if (!wrap) return;
wrap.innerHTML = GE_SIGNS.map(function(s) {
var ip2=d.pos.indexOf(s)>=0,in2=d.neg.indexOf(s)>=0;
var cls=ip2?‘pos’:in2?‘neg’:’’; var b=ip2?’ ✓’:in2?’ ✗’:’’;
return ‘<span class="chip ' + cls + '" data-ge="' + esc(s) + '">’ + esc(s) + b + ‘</span>’;
}).join(’’);
wrap.querySelectorAll(’[data-ge]’).forEach(function(c) {
c.addEventListener(‘click’, function() { toggleGE(c.dataset.ge); });
});
}

/* ── SAVE STEP ── */
function saveStep(s) {

PT.name = val(‘i-name’);

case 6:

return true;
case 9:
PT.se = {cvs1:val(‘se-cvs1’),cvs2:val(‘se-cvs2’),cvs3:val(‘se-cvs3’),resp1:val(‘se-resp1’),resp2:val(‘se-resp2’),abd1:val(‘se-abd1’),abd2:val(‘se-abd2’),abd3:val(‘se-abd3’),rectal:val(‘se-rectal’),cns1:val(‘se-cns1’),cns2:val(‘se-cns2’),cns3:val(‘se-cns3’),cns4:val(‘se-cns4’),cns5:val(‘se-cns5’),cns6:val(‘se-cns6’)};
return true;
case 10:
PT.dx = {provisional:val(‘dx-prov’),final:val(‘dx-final’)};

function nextStep() {
if (!saveStep(STEP)) return;
if (STEP === TOTAL-1) { finalise(); return; }
STEP++; renderStep();
}
function prevStep() {
saveStep(STEP);
if (STEP > 0) { STEP–; renderStep(); }
}
function finalise() {
if (!PT.id) PT.id = uid();
PT.updatedAt = new Date().toISOString();
if (!PT.createdAt) PT.createdAt = PT.updatedAt;
var i = DB.findIndex ? DB.findIndex(function(x){return x.id===PT.id;}) : (function(){for(var j=0;j<DB.length;j++)if(DB[j].id===PT.id)return j;return -1;})();
if (i >= 0) DB[i] = PT; else DB.unshift(PT);
persist();
toast(‘Patient saved ✓’);
$(‘case-name-bar’).textContent = (PT.name||‘Unknown’) + ’ · Case Sheet’;
$(‘case-body’).innerHTML = buildCaseSheet(PT);
go(‘scr-case’);
}

p.complaints.forEach(function(c,i) {
h += ‘<li><b>’ + (i+1) + ’. ’ + esc(c.complaint) + ‘</b>’ + (c.duration ? ’ — ’ + esc(c.duration) : ‘’) + ‘</li>’;

/* Systemic Review */

];

if (n) h += ‘<p style="font-style:italic">’ + esc(n) + ‘</p>’;
h += ‘</div></div>’;
});

/* Past History */

if (p.fhDetails) h += ‘<p>’ + esc(p.fhDetails) + ‘</p>’;

/* Personal/Social/Dietary */
var hasPS = ps.economic||ps.education||ps.family||ps.residence||(p.habits&&p.habits.length)||p.habitDetails||ps.dietType||ps.dietAdequacy||p.dietNotes;

var vitals = [[‘Pulse’,ge.pulse],[‘BP’,ge.bp],[‘Temp’,ge.temp],[‘RR’,ge.rr],[‘SpO₂’,ge.spo2],[‘Wt/BMI’,ge.weight]].filter(function(v){return v[1];});

if (ge.oedema) h += ’<p><b>Oedema:</b> ’ + esc(ge.oedema) + ‘</p>’;
