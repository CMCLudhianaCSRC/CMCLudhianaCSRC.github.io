<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ClinCase — Medical Case Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & BASE ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f2847;
  --navy2:#1a3a5c;
  --teal:#1a7a6e;
  --teal-light:#e6f4f2;
  --red:#c0392b;
  --red-light:#fdecea;
  --gold:#c9973a;
  --bg:#f5f3ee;
  --card:#ffffff;
  --border:#ddd8ce;
  --text:#1c1c1c;
  --muted:#6b6560;
  --radius:12px;
  --shadow:0 2px 16px rgba(15,40,71,.09);
}
[data-theme="dark"]{
  --bg:#0d1520;
  --card:#162032;
  --border:#243447;
  --text:#e8e4db;
  --muted:#8a9bb0;
  --navy:#1e3a5f;
  --teal-light:#0d2820;
  --red-light:#2a1010;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:15px;
  line-height:1.6;
  transition:background .3s,color .3s;
}

/* ─── SCROLLBAR ────────────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:4px}

/* ─── SCREENS ──────────────────────────────────────────── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ─── TOP BAR ──────────────────────────────────────────── */
.topbar{
background:var(–navy);
color:#fff;
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;top:0;z-index:100;
box-shadow:0 2px 12px rgba(0,0,0,.2);
}
.topbar-title{font-family:‘Lora’,serif;font-size:1.15rem;font-weight:600;letter-spacing:.3px}
.topbar-sub{font-size:.72rem;opacity:.6;margin-top:1px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.icon-btn{
background:rgba(255,255,255,.12);border:none;color:#fff;
width:36px;height:36px;border-radius:50%;cursor:pointer;
display:flex;align-items:center;justify-content:center;font-size:1rem;
transition:background .2s;
}
.icon-btn:hover{background:rgba(255,255,255,.22)}

/* ─── PROGRESS BAR ─────────────────────────────────────── */
.progress-wrap{background:var(–card);border-bottom:1px solid var(–border);padding:10px 18px}
.progress-info{display:flex;justify-content:space-between;font-size:.75rem;color:var(–muted);margin-bottom:6px}
.progress-track{background:var(–border);border-radius:99px;height:5px}
.progress-fill{background:var(–teal);height:5px;border-radius:99px;transition:width .4s ease}

/* ─── CONTENT AREA ─────────────────────────────────────── */
.content{flex:1;padding:18px;overflow-y:auto;padding-bottom:90px}

/* ─── CARDS ────────────────────────────────────────────── */
.card{
background:var(–card);border:1px solid var(–border);
border-radius:var(–radius);padding:18px;margin-bottom:14px;
box-shadow:var(–shadow);
}
.card-title{
font-family:‘Lora’,serif;font-size:1rem;font-weight:600;
color:var(–navy);margin-bottom:14px;
display:flex;align-items:center;gap:8px;
}
[data-theme=“dark”] .card-title{color:#7ab3e0}
.card-title .icon{font-size:1.1rem}

/* ─── FORM ELEMENTS ────────────────────────────────────── */
.field{margin-bottom:14px}
.field label{
display:block;font-size:.78rem;font-weight:600;
color:var(–muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;
}
.field input,.field textarea,.field select{
width:100%;padding:10px 13px;
border:1.5px solid var(–border);border-radius:8px;
background:var(–bg);color:var(–text);
font-family:‘DM Sans’,sans-serif;font-size:.93rem;
transition:border-color .2s,background .2s;
-webkit-appearance:none;
}
.field input:focus,.field textarea:focus,.field select:focus{
outline:none;border-color:var(–teal);background:var(–card);
}
.field textarea{resize:vertical;min-height:80px}
.field select option{background:var(–card)}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ─── TOGGLE CHIPS ──────────────────────────────────────── */
.chips-label{font-size:.78rem;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.chip{
padding:6px 13px;border-radius:99px;font-size:.8rem;font-weight:500;cursor:pointer;
border:1.5px solid var(–border);background:var(–card);color:var(–text);
transition:all .18s;user-select:none;
}
.chip:hover{border-color:var(–teal);color:var(–teal)}
.chip.pos{border-color:var(–teal)!important;background:var(–teal-light)!important;color:var(–teal)!important;font-weight:600}
.chip.neg{border-color:var(–red)!important;background:var(–red-light)!important;color:var(–red)!important}
.chip.sel{border-color:var(–gold)!important;background:#fef9ee!important;color:var(–gold)!important}
[data-theme=“dark”] .chip.sel{background:#2a2010!important}
.system-section{margin-bottom:20px;padding:14px;border:1px solid var(–border);border-radius:10px;background:var(–bg)}
.system-title{font-weight:600;color:var(–navy);font-size:.9rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}
[data-theme=“dark”] .system-title{color:#7ab3e0}
.system-sub{font-size:.75rem;color:var(–muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}

/* ─── COMPLAINT ROW ────────────────────────────────────── */
.complaint-row{
display:flex;align-items:center;gap:8px;
background:var(–bg);border:1px solid var(–border);
border-radius:8px;padding:10px 12px;margin-bottom:8px;
}
.complaint-row input{flex:1;border:none;background:transparent;font-size:.9rem;color:var(–text);font-family:‘DM Sans’,sans-serif}
.complaint-row input:focus{outline:none}
.complaint-dur{width:90px!important;font-size:.82rem!important;text-align:center}
.del-btn{background:none;border:none;color:var(–muted);cursor:pointer;font-size:1.1rem;padding:2px 4px;flex-shrink:0}
.del-btn:hover{color:var(–red)}
.add-btn{
display:flex;align-items:center;gap:6px;
background:none;border:1.5px dashed var(–teal);color:var(–teal);
padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:500;
width:100%;justify-content:center;transition:background .2s;
}
.add-btn:hover{background:var(–teal-light)}

/* ─── BOTTOM NAV ────────────────────────────────────────── */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
background:var(–card);border-top:1px solid var(–border);
padding:12px 18px;display:flex;gap:10px;z-index:99;
box-shadow:0 -4px 16px rgba(0,0,0,.07);
}
.btn{
flex:1;padding:12px;border-radius:10px;border:none;
font-family:‘DM Sans’,sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;
transition:all .18s;
}
.btn-primary{background:var(–navy);color:#fff}
.btn-primary:hover{background:var(–navy2)}
.btn-secondary{background:var(–bg);color:var(–text);border:1.5px solid var(–border)}
.btn-secondary:hover{border-color:var(–navy);color:var(–navy)}
.btn-teal{background:var(–teal);color:#fff}
.btn-teal:hover{opacity:.9}
.btn-danger{background:var(–red-light);color:var(–red);border:1.5px solid var(–red)}

/* ─── HOME SCREEN ───────────────────────────────────────── */
#home-screen{background:var(–navy);color:#fff}
.home-hero{
flex:1;display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:40px 24px 20px;text-align:center;
}
.home-logo{font-size:3.5rem;margin-bottom:12px}
.home-title{font-family:‘Lora’,serif;font-size:2rem;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
.home-subtitle{font-size:.9rem;opacity:.65;max-width:260px;line-height:1.5}
.home-institution{font-size:.72rem;opacity:.4;margin-top:8px;text-transform:uppercase;letter-spacing:1px}
.home-actions{padding:20px 24px 40px;display:flex;flex-direction:column;gap:12px}
.home-btn{
padding:16px;border-radius:12px;border:none;
font-family:‘DM Sans’,sans-serif;font-size:1rem;font-weight:600;
cursor:pointer;display:flex;align-items:center;gap:12px;
text-align:left;transition:all .2s;
}
.home-btn-primary{background:#fff;color:var(–navy)}
.home-btn-primary:hover{background:#e8f0fa}
.home-btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.2)}
.home-btn-secondary:hover{background:rgba(255,255,255,.18)}
.home-btn-icon{font-size:1.3rem}
.home-btn-text small{display:block;font-size:.75rem;opacity:.6;font-weight:400;margin-top:1px}
.home-dark-toggle{
position:absolute;top:18px;right:18px;
background:rgba(255,255,255,.12);border:none;color:#fff;
width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1rem;
}

/* ─── PATIENT LIST ──────────────────────────────────────── */
.patient-item{
display:flex;align-items:center;gap:12px;
padding:14px;background:var(–card);border:1px solid var(–border);
border-radius:10px;margin-bottom:10px;cursor:pointer;
transition:border-color .2s,transform .15s;
}
.patient-item:hover{border-color:var(–teal);transform:translateX(2px)}
.patient-avatar{
width:44px;height:44px;border-radius:50%;
background:var(–navy);color:#fff;display:flex;align-items:center;justify-content:center;
font-family:‘Lora’,serif;font-size:1.1rem;font-weight:700;flex-shrink:0;
}
.patient-info{flex:1}
.patient-name{font-weight:600;font-size:.95rem}
.patient-meta{font-size:.78rem;color:var(–muted);margin-top:2px}
.patient-actions{display:flex;gap:6px}
.p-del-btn{background:none;border:none;color:var(–muted);cursor:pointer;font-size:1rem;padding:4px}
.p-del-btn:hover{color:var(–red)}
.empty-state{text-align:center;padding:60px 20px;color:var(–muted)}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* ─── CASE VIEW ─────────────────────────────────────────── */
.case-section{margin-bottom:22px}
.case-section-title{
font-family:‘Lora’,serif;font-size:1rem;font-weight:700;
color:var(–navy);border-bottom:2px solid var(–navy);
padding-bottom:5px;margin-bottom:10px;
}
[data-theme=“dark”] .case-section-title{color:#7ab3e0;border-color:#7ab3e0}
.case-row{display:flex;flex-wrap:wrap;gap:4px 20px;margin-bottom:6px}
.case-kv{font-size:.88rem}
.case-kv b{color:var(–muted);font-weight:500}
.case-body{font-size:.9rem;line-height:1.7}
.case-body ul{padding-left:18px}
.case-body ul li{margin-bottom:3px}
.finding-pos{color:var(–teal);font-weight:500}
.finding-neg{color:var(–muted)}
.sys-block{margin-bottom:10px}
.sys-block-title{font-weight:600;font-size:.88rem;color:var(–text);margin-bottom:4px}

/* ─── PRINT STYLES ──────────────────────────────────────── */
@media print{
.topbar,.bottom-nav,.progress-wrap,.no-print{display:none!important}
body{background:#fff!important;color:#000!important}
.content{padding:0!important}
.card{box-shadow:none!important;border:1px solid #ccc!important;break-inside:avoid}
.case-section-title{color:#000!important;border-color:#000!important}
#case-view-screen .content{padding-bottom:0!important}
}

/* ─── TOAST ─────────────────────────────────────────────── */
.toast{
position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);
background:#222;color:#fff;padding:10px 20px;border-radius:8px;
font-size:.85rem;opacity:0;transition:all .3s;pointer-events:none;z-index:999;
white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── DIAGNOSIS SECTION ─────────────────────────────────── */
.dx-chip{
display:inline-block;padding:4px 12px;border-radius:99px;
font-size:.8rem;margin:3px;border:1px solid var(–teal);
background:var(–teal-light);color:var(–teal);
}
.dx-chip-prov{border-color:var(–gold);background:#fef9ee;color:var(–gold)}
[data-theme=“dark”] .dx-chip-prov{background:#2a2010}
.dx-chip-diff{border-color:var(–muted);background:var(–bg);color:var(–muted)}
.dx-chip-final{border-color:var(–teal);background:var(–teal-light);color:var(–teal);font-weight:700}

/* ─── STEP SECTION HEADER ───────────────────────────────── */
.step-header{
background:linear-gradient(135deg,var(–navy) 0%,var(–navy2) 100%);
color:#fff;padding:16px 18px;margin-bottom:18px;border-radius:var(–radius);
}
.step-header h2{font-family:‘Lora’,serif;font-size:1.1rem;margin-bottom:2px}
.step-header p{font-size:.78rem;opacity:.65}

/* ─── VITALS GRID ───────────────────────────────────────── */
.vitals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ─── SEARCH ────────────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{
width:100%;padding:10px 13px 10px 38px;
border:1.5px solid var(–border);border-radius:8px;
background:var(–card);color:var(–text);
font-family:‘DM Sans’,sans-serif;font-size:.9rem;
}
.search-wrap input:focus{outline:none;border-color:var(–teal)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(–muted)}

/* ─── SECTION NOTE ──────────────────────────────────────── */
.section-note{
font-size:.78rem;color:var(–muted);
background:var(–bg);border-left:3px solid var(–teal);
padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:14px;
}
</style>

</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     HOME SCREEN
════════════════════════════════════════════════════════ -->

<div id="home-screen" class="screen active">
  <button class="home-dark-toggle" onclick="toggleDark()" id="dark-toggle-btn" aria-label="Toggle dark mode">🌙</button>
  <div class="home-hero">
    <div class="home-logo">🏥</div>
    <div class="home-title">ClinCase</div>
    <div class="home-subtitle">Structured clinical case-taking based on CMC Ludhiana protocol</div>
    <div class="home-institution">Christian Medical College, Ludhiana</div>
  </div>
  <div class="home-actions">
    <button class="home-btn home-btn-primary" onclick="startNewPatient()">
      <span class="home-btn-icon">📋</span>
      <span class="home-btn-text">New Patient<small>Begin structured case history</small></span>
    </button>
    <button class="home-btn home-btn-secondary" onclick="showScreen('patients-screen')">
      <span class="home-btn-icon">🗂</span>
      <span class="home-btn-text">Saved Patients<small id="saved-count-label">Loading…</small></span>
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     PATIENTS LIST SCREEN
════════════════════════════════════════════════════════ -->

<div id="patients-screen" class="screen">
  <div class="topbar">
    <div>
      <div class="topbar-title">Saved Patients</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="toggleDark()">🌙</button>
      <button class="icon-btn" onclick="showScreen('home-screen')">🏠</button>
    </div>
  </div>
  <div class="content">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="patient-search" placeholder="Search by name, age, diagnosis…" oninput="renderPatientList()"/>
    </div>
    <div id="patient-list"></div>
  </div>
  <div class="bottom-nav">
    <button class="btn btn-teal" onclick="startNewPatient()">+ New Patient</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     FORM SCREEN (multi-step)
════════════════════════════════════════════════════════ -->

<div id="form-screen" class="screen">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="form-step-title">Patient Details</div>
      <div class="topbar-sub" id="form-step-sub">Step 1 of 11</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="confirmExit()" title="Exit">✕</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="prog-text">Step 1 / 11</span>
      <span id="prog-pct">9%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:9%"></div></div>
  </div>
  <div class="content" id="form-content"></div>
  <div class="bottom-nav">
    <button class="btn btn-secondary" id="btn-back" onclick="prevStep()">← Back</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextStep()">Next →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     CASE VIEW SCREEN
════════════════════════════════════════════════════════ -->

<div id="case-view-screen" class="screen">
  <div class="topbar">
    <div>
      <div class="topbar-title">Case Sheet</div>
      <div class="topbar-sub" id="case-view-name"></div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn no-print" onclick="printCase()" title="Download PDF">🖨</button>
      <button class="icon-btn no-print" onclick="goBackFromCase()">← Back</button>
    </div>
  </div>
  <div class="content" id="case-view-content"></div>
  <div class="bottom-nav no-print">
    <button class="btn btn-secondary" onclick="goBackFromCase()">← Back</button>
    <button class="btn btn-teal" onclick="printCase()">🖨 Download PDF</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════
   DATA MODEL & STORAGE
════════════════════════════════════════════════════════ */
let patients = JSON.parse(localStorage.getItem('clincase_patients') || '[]');
let currentPatient = {};
let currentStep = 0;
let editingId = null;
let caseViewSource = 'patients'; // 'patients' or 'form'

function savePatients(){
  localStorage.setItem('clincase_patients', JSON.stringify(patients));
}

function genId(){
  return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
}

/* ════════════════════════════════════════════════════════
   SCREEN MANAGEMENT
════════════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='patients-screen') renderPatientList();
  if(id==='home-screen') updateHomeCounts();
}

function updateHomeCounts(){
  const n = patients.length;
  document.getElementById('saved-count-label').textContent =
    n===0 ? 'No saved patients yet' : n===1 ? '1 patient saved' : `${n} patients saved`;
}

/* ════════════════════════════════════════════════════════
   DARK MODE
════════════════════════════════════════════════════════ */
let dark = localStorage.getItem('clincase_dark')==='1';
function toggleDark(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme', dark?'dark':'');
  localStorage.setItem('clincase_dark', dark?'1':'0');
  document.getElementById('dark-toggle-btn').textContent = dark?'☀️':'🌙';
}
if(dark){
  document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('dark-toggle-btn').textContent='☀️';
}

/* ════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

/* ════════════════════════════════════════════════════════
   STEP DEFINITIONS
════════════════════════════════════════════════════════ */
const STEPS = [
  {title:'Patient Details',        sub:'Demographics & identifiers'},
  {title:'Chief Complaints',       sub:'Reason for presentation'},
  {title:'History of Present Illness', sub:'Detailed symptom narrative'},
  {title:'Systemic Review — CVS & Respiratory', sub:'Cardiovascular & Lung symptoms'},
  {title:'Systemic Review — GI & Urinary', sub:'Gastrointestinal & Renal symptoms'},
  {title:'Systemic Review — CNS, Endocrine & Others', sub:'Neurological, hormonal & MSK'},
  {title:'Past History & Family History', sub:'Medical background'},
  {title:'Personal, Social & Dietary History', sub:'Lifestyle & habits'},
  {title:'General Examination',    sub:'Vitals & systemic findings'},
  {title:'Systemic Examination',   sub:'CVS, Resp, Abdomen, CNS'},
  {title:'Diagnosis',              sub:'Provisional, differential & final'},
];
const TOTAL_STEPS = STEPS.length;

/* ════════════════════════════════════════════════════════
   SYMPTOM LISTS BY SYSTEM
════════════════════════════════════════════════════════ */
const SYS_SYMPTOMS = {
  cvs:[
    'Breathlessness on heavy exertion','Breathlessness on moderate exertion',
    'Breathlessness at rest','PND (Paroxysmal Nocturnal Dyspnoea)','Orthopnoea',
    'Swelling of feet','Swelling of face / periorbital oedema','Sacral oedema',
    'Anginal chest pain','Palpitations (sudden onset)','Palpitations (gradual onset)',
    'History of MI','Embolic phenomena','Syncope / pre-syncope',
  ],
  resp:[
    'Cough (dry)','Cough (productive)','Purulent sputum','Frothy pink sputum',
    'Haemoptysis','Chest pain (pleuritic)','Breathlessness','Wheezing',
    'Weight loss','Night sweats','Fever',
  ],
  gi:[
    'Loss of appetite','Weight loss','Abdominal pain','Abdominal mass',
    'Nausea','Vomiting','Haematemesis','Melaena','Dysphagia (solids)',
    'Dysphagia (liquids)','Heartburn / GERD','Abdominal distension',
    'Flatulence','Change in bowel habits','Diarrhoea (with blood / mucus)',
    'Constipation','Jaundice','Dark urine','Pale stools','Itching',

/* ════════════════════════════════════════════════════════
   BUILD STEP HTML
════════════════════════════════════════════════════════ */
function buildStep(step){
  switch(step){
    case 0: return buildPatientDetails();
    case 1: return buildChiefComplaints();
    case 2: return buildHOPI();
    case 3: return buildSysReview1();
    case 4: return buildSysReview2();
    case 5: return buildSysReview3();
    case 6: return buildPastFamily();
    case 7: return buildPersonalSocial();
    case 8: return buildGeneralExam();
    case 9: return buildSysExam();
    case 10: return buildDiagnosis();
    default: return '<p>Unknown step</p>';
  }
}

/* ── STEP 1: Chief Complaints ────────────────────────── */
function buildChiefComplaints(){
  const complaints = currentPatient.complaints || [{complaint:'',duration:''}];
  let rows = complaints.map((c,i)=>`
    <div class="complaint-row" id="cc-row-${i}">
      <input type="text" placeholder="Complaint ${i+1}" value="${c.complaint||''}" 
        onchange="updateComplaint(${i},'complaint',this.value)"
        oninput="updateComplaint(${i},'complaint',this.value)"/>
      <input type="text" class="complaint-dur" placeholder="Duration" value="${c.duration||''}"
        onchange="updateComplaint(${i},'duration',this.value)"
        oninput="updateComplaint(${i},'duration',this.value)"/>
      <button class="del-btn" onclick="removeComplaint(${i})">🗑</button>
    </div>`).join('');
  return `
  <div class="step-header"><h2>📝 Chief Complaints</h2><p>In patient's own words, chronological order</p></div>
  <div class="section-note">Enter each complaint with its duration (e.g. "3 days", "2 months"). Listed in chronological order.</div>
  <div class="card">
    <div id="complaints-list">${rows}</div>
    <button class="add-btn" onclick="addComplaint()">+ Add Complaint</button>
  </div>`;
}

function updateComplaint(i,field,val){
  if(!currentPatient.complaints) currentPatient.complaints=[];
  if(!currentPatient.complaints[i]) currentPatient.complaints[i]={complaint:'',duration:''};
  currentPatient.complaints[i][field]=val;
}
function addComplaint(){
  if(!currentPatient.complaints) currentPatient.complaints=[];
  currentPatient.complaints.push({complaint:'',duration:''});
  renderCurrentStep();
}
function removeComplaint(i){
  if(!currentPatient.complaints||currentPatient.complaints.length<=1) return;
  currentPatient.complaints.splice(i,1);
  renderCurrentStep();
}
function saveComplaints(){
  if(!currentPatient.complaints||currentPatient.complaints.filter(c=>c.complaint.trim()).length===0){
    showToast('Add at least one complaint');return false;
  }
  currentPatient.complaints = currentPatient.complaints.filter(c=>c.complaint.trim());
  return true;
}

function buildSystemBlock(key,label,sysKey){
const syms = SYS_SYMPTOMS[sysKey]||[];
const stored = (currentPatient.systemicReview||{})[key]||{pos:[],neg:[]};
let chips = syms.map(s=>{
const isPos = stored.pos.includes(s);
const isNeg = stored.neg.includes(s);
const cls = isPos?‘pos’:isNeg?‘neg’:’’;
const badge = isPos?’ ✓’:isNeg?’ ✗’:’’;
return `<span class="chip ${cls}" onclick="toggleSymptom('${key}','${escAttr(s)}')">${s}${badge}</span>`;
}).join(’’);
return `

  <div class="system-section">
    <div class="system-title">${label}</div>
    <div class="chips-label">Tap: unmarked → Positive → Negative → unmarked</div>
    <div class="chips-wrap" id="chips-${key}">${chips}</div>
    <div class="field" style="margin-top:10px;margin-bottom:0">
      <label>Additional notes</label>
      <textarea rows="2" id="sysnotes-${key}" placeholder="Any additional findings or details…">${(currentPatient.systemicNotes||{})[key]||''}</textarea>
    </div>
  </div>`;
}

function escAttr(s){return s.replace(/’/g,”\’”).replace(/”/g,’"’)}

function toggleSymptom(sysKey, symptom){
if(!currentPatient.systemicReview) currentPatient.systemicReview={};
if(!currentPatient.systemicReview[sysKey]) currentPatient.systemicReview[sysKey]={pos:[],neg:[]};
const sys = currentPatient.systemicReview[sysKey];
const isPos = sys.pos.includes(symptom);
const isNeg = sys.neg.includes(symptom);
if(!isPos && !isNeg){ sys.pos.push(symptom); }
else if(isPos){ sys.pos=sys.pos.filter(x=>x!==symptom); sys.neg.push(symptom); }
else { sys.neg=sys.neg.filter(x=>x!==symptom); }
// Re-render just chips
const syms = SYS_SYMPTOMS[sysKey]||[];
const stored = currentPatient.systemicReview[sysKey];
document.getElementById(‘chips-’+sysKey).innerHTML = syms.map(s=>{
const ip=stored.pos.includes(s),in_=stored.neg.includes(s);
const cls=ip?‘pos’:in_?‘neg’:’’;
const badge=ip?’ ✓’:in_?’ ✗’:’’;
return `<span class="chip ${cls}" onclick="toggleSymptom('${sysKey}','${escAttr(s)}')">${s}${badge}</span>`;
}).join(’’);
}

function saveSysNotes(keys){
if(!currentPatient.systemicNotes) currentPatient.systemicNotes={};
keys.forEach(k=>{
const el=document.getElementById(‘sysnotes-’+k);
if(el) currentPatient.systemicNotes[k]=el.value;
});
}

      <textarea id="f-ge-notes" rows="3" placeholder="Any other general examination findings…">${ge.notes||''}</textarea></div>
  </div>`;
}

function toggleGEFinding(s){
if(!currentPatient.genExamFindings) currentPatient.genExamFindings={pos:[],neg:[]};
const sys=currentPatient.genExamFindings;
const ip=sys.pos.includes(s),in_=sys.neg.includes(s);
if(!ip&&!in_) sys.pos.push(s);
else if(ip){sys.pos=sys.pos.filter(x=>x!==s);sys.neg.push(s);}
else sys.neg=sys.neg.filter(x=>x!==s);
const items=[‘Pallor’,‘Cyanosis (peripheral)’,‘Cyanosis (central)’,‘Clubbing’,‘Koilonychia’,
‘Jaundice (mild)’,‘Jaundice (moderate)’,‘Jaundice (severe)’,‘Lymphadenopathy’,
‘Oedema (pitting)’,‘Oedema (non-pitting)’,‘Dehydration’,‘Recent weight loss’,
‘Skin rash’,‘Pigmentation’,‘Purpura’,‘Café-au-lait spots’,‘Nodules’];
document.getElementById(‘ge-chips’).innerHTML = items.map(sym=>{
const ip2=(currentPatient.genExamFindings.pos||[]).includes(sym);
const in2=(currentPatient.genExamFindings.neg||[]).includes(sym);
const cls=ip2?‘pos’:in2?‘neg’:’’;
const b=ip2?’ ✓’:in2?’ ✗’:’’;
return `<span class="chip ${cls}" onclick="toggleGEFinding('${escAttr(sym)}')">${sym}${b}</span>`;
}).join(’’);
}

function saveGeneralExam(){
const ge = currentPatient.generalExam||{};
currentPatient.generalExam = Object.assign(ge, {
pulse:v(‘f-pulse’),bp:v(‘f-bp’),temp:v(‘f-temp’),rr:v(‘f-rr’),
spo2:v(‘f-spo2’),weight:v(‘f-weight’),consciousness:v(‘f-consciousness’),
build:v(‘f-build’),lymphDetails:v(‘f-lymph-details’),
oedemaDetails:v(‘f-oedema-details’),notes:v(‘f-ge-notes’),
});
return true;
}

  </div>

    <div class="field"><label>Sensory System</label>

function saveSysExam(){
currentPatient.sysExam = {
cvsPulse:v(‘f-se-cvs-pulse’),cvsPrecordium:v(‘f-se-cvs-precordium’),
cvsAuscult:v(‘f-se-cvs-auscult’),respIPP:v(‘f-se-resp-ipp’),
respAuscult:v(‘f-se-resp-auscult’),abdInsp:v(‘f-se-abd-insp’),

function updateDDx(i,v){
if(!currentPatient.ddx) currentPatient.ddx=[’’,’’];
currentPatient.ddx[i]=v;
}
function addDDx(){
if(!currentPatient.ddx) currentPatient.ddx=[’’,’’];
currentPatient.ddx.push(’’);
renderCurrentStep();
}
function removeDDx(i){
if(!currentPatient.ddx||currentPatient.ddx.length<=1) return;
currentPatient.ddx.splice(i,1);
renderCurrentStep();
}
function saveDiagnosis(){
currentPatient.diagnosis = {
provisional:v(‘f-dx-provisional’),
final:v(‘f-dx-final’),
};
currentPatient.investigations = v(‘f-investigations’);
if(!currentPatient.ddx) currentPatient.ddx=[];
currentPatient.ddx = currentPatient.ddx.filter(d=>d&&d.trim());
return true;
}

/* ════════════════════════════════════════════════════════
STEP NAVIGATION
════════════════════════════════════════════════════════ */
function v(id){const el=document.getElementById(id);return el?el.value.trim():’’;}

function saveCurrentStep(){
switch(currentStep){
case 0: return savePatientDetails();
case 1: return saveComplaints();
case 2: saveHOPI(); return true;
case 3: saveSysNotes([‘cvs’,‘resp’]); return true;
case 4: saveSysNotes([‘gi’,‘urine’]); return true;
case 5: saveSysNotes([‘cns’,‘endocrine’,‘locomotor’,‘bleeding’]); return true;
case 6: return savePastFamily();
case 7: savePersonalSocial(); return true;
case 8: saveGeneralExam(); return true;
case 9: saveSysExam(); return true;
case 10: return saveDiagnosis();
}
return true;
}

function renderCurrentStep(){
document.getElementById(‘form-content’).innerHTML = buildStep(currentStep);
updateProgress();
window.scrollTo(0,0);
document.getElementById(‘form-content’).scrollTop=0;
}

function updateProgress(){
const pct = Math.round(((currentStep+1)/TOTAL_STEPS)*100);
document.getElementById(‘prog-fill’).style.width = pct+’%’;
document.getElementById(‘prog-text’).textContent = `Step ${currentStep+1} / ${TOTAL_STEPS}`;
document.getElementById(‘prog-pct’).textContent = pct+’%’;
document.getElementById(‘form-step-title’).textContent = STEPS[currentStep].title;
document.getElementById(‘form-step-sub’).textContent = STEPS[currentStep].sub;
document.getElementById(‘btn-back’).style.display = currentStep===0?‘none’:‘flex’;
document.getElementById(‘btn-next’).textContent = currentStep===TOTAL_STEPS-1?‘✓ Save Patient’:‘Next →’;
}

function nextStep(){
if(!saveCurrentStep()) return;
if(currentStep===TOTAL_STEPS-1){
finalizePatient();
} else {
currentStep++;
renderCurrentStep();
}
}

function prevStep(){
saveCurrentStep();
if(currentStep>0){currentStep–;renderCurrentStep();}
}

function finalizePatient(){
// Assign ID + timestamp
if(!currentPatient.id) currentPatient.id=genId();
currentPatient.updatedAt = new Date().toISOString();
if(!currentPatient.createdAt) currentPatient.createdAt=new Date().toISOString();
// Save or update
const idx = patients.findIndex(p=>p.id===currentPatient.id);
if(idx>=0) patients[idx]=currentPatient;
else patients.unshift(currentPatient);
savePatients();
showToast(‘Patient saved successfully!’);
caseViewSource=‘form’;
openCaseView(currentPatient);
}

/* ════════════════════════════════════════════════════════
START NEW PATIENT
════════════════════════════════════════════════════════ */
function startNewPatient(){
currentPatient = {};
currentStep = 0;
editingId = null;
showScreen(‘form-screen’);
renderCurrentStep();
}

function editPatient(id){
const p = patients.find(x=>x.id===id);
if(!p) return;
currentPatient = JSON.parse(JSON.stringify(p));
currentStep=0;
editingId=id;
showScreen(‘form-screen’);
renderCurrentStep();
}

function confirmExit(){
if(confirm(‘Exit case form? Unsaved progress on this step may be lost.’)) showScreen(‘home-screen’);
}

/* ════════════════════════════════════════════════════════
PATIENT LIST
════════════════════════════════════════════════════════ */
function renderPatientList(){
const q=(document.getElementById(‘patient-search’)||{}).value||’’;
const filtered = patients.filter(p=>{
if(!q) return true;
const s=(p.name||’’)+(p.age||’’)+(p.sex||’’)+((p.diagnosis||{}).final||’’)+((p.diagnosis||{}).provisional||’’);
return s.toLowerCase().includes(q.toLowerCase());
});
const el=document.getElementById(‘patient-list’);
if(filtered.length===0){
el.innerHTML=`<div class="empty-state"><div class="empty-icon">📂</div><p>${q?'No patients match your search.':'No patients saved yet.<br>Start by adding a new patient.'}</p></div>`;
return;
}
el.innerHTML=filtered.map(p=>` <div class="patient-item" onclick="openCaseView(${JSON.stringify(p).replace(/"/g,'&quot;')})"> <div class="patient-avatar">${(p.name||'?')[0].toUpperCase()}</div> <div class="patient-info"> <div class="patient-name">${p.name||'Unnamed'}</div> <div class="patient-meta">${[p.age,p.sex,p.occupation].filter(Boolean).join(' · ')} ${p.doa?'| Admitted: '+formatDate(p.doa):''}</div> <div class="patient-meta" style="color:var(--teal);margin-top:2px">${(p.diagnosis||{}).provisional||'No diagnosis recorded'}</div> </div> <div class="patient-actions" onclick="event.stopPropagation()"> <button class="p-del-btn" onclick="editPatient('${p.id}')" title="Edit">✏️</button> <button class="p-del-btn" onclick="deletePatient('${p.id}')" title="Delete">🗑</button> </div> </div>`).join(’’);
}

function deletePatient(id){
if(!confirm(‘Delete this patient? This cannot be undone.’)) return;
patients=patients.filter(p=>p.id!==id);
savePatients();
renderPatientList();
showToast(‘Patient deleted’);
}

function formatDate(d){
if(!d) return ‘’;
try{const dt=new Date(d);return dt.toLocaleDateString(‘en-IN’,{day:‘numeric’,month:‘short’,year:‘numeric’});}
catch(e){return d;}
}

CASE VIEW — GENERATE FORMATTED CASE SHEET

function openCaseView(p){
if(typeof p===‘string’) p=JSON.parse(p);
showScreen(‘case-view-screen’);
document.getElementById(‘case-view-name’).textContent = (p.name||‘Unknown’)+’ · Case Sheet’;
document.getElementById(‘case-view-content’).innerHTML = generateCaseSheet(p);
}

function goBackFromCase(){
showScreen(caseViewSource===‘form’?‘patients-screen’:‘patients-screen’);
caseViewSource=‘patients’;
}

function printCase(){
window.print();
}

function generateCaseSheet(p){
let html = ‘’;

/* ── Header ── */
html += `<div class="card"> <div style="text-align:center;padding:8px 0 14px"> <div style="font-family:'Lora',serif;font-size:1.2rem;font-weight:700;color:var(--navy)">CLINICAL CASE SHEET</div> <div style="font-size:.75rem;color:var(--muted);margin-top:2px">Christian Medical College, Ludhiana</div> </div> <div class="case-row"> ${kv('Name', p.name)} ${kv('Age', p.age)} ${kv('Sex', p.sex)} ${kv('Occupation', p.occupation)} ${kv('Marital Status', p.marital)} </div> <div class="case-row" style="margin-top:6px"> ${kv('Date of Admission', formatDate(p.doa))} ${kv('Date of Examination', formatDate(p.doe))} ${kv('Informant', p.informant)} ${kv('ID Mark', p.idmark)} ${kv('Insurance', p.insurance)} </div> ${p.address?`<div style="font-size:.85rem;margin-top:6px"><b style="color:var(--muted);font-weight:500">Address:</b> ${p.address}</div>`:’’}

  </div>`;

/* ── Chief Complaints ── */
if(p.complaints&&p.complaints.length){
html+=`<div class="card"><div class="case-section-title">CHIEF COMPLAINTS</div><div class="case-body"><ul>`;
p.complaints.forEach((c,i)=>{
html+=`<li><b>${i+1}. ${c.complaint}</b>${c.duration?' — '+c.duration:''}</li>`;
});
html+=`</ul></div></div>`;
}

/* ── HOPI ── */
if(p.hopi||p.etiology){
html+=`<div class="card"><div class="case-section-title">HISTORY OF PRESENT ILLNESS</div>`;
if(p.hopi) html+=`<div class="case-body">${escHtml(p.hopi).replace(/\n/g,'<br/>')}</div>`;
if(p.etiology) html+=`<div style="margin-top:12px"><div style="font-weight:600;font-size:.88rem;margin-bottom:4px;color:var(--muted)">ETIOLOGICAL HISTORY</div><div class="case-body">${escHtml(p.etiology).replace(/\n/g,'<br/>')}</div></div>`;
html+=`</div>`;
}

/* ── Systemic Review ── */
const sysLabels = {
cvs:‘Cardiovascular System’,resp:‘Respiratory System’,
gi:‘Gastrointestinal System’,urine:‘Urinary System’,
cns:‘Central Nervous System’,endocrine:‘Endocrine System’,
locomotor:‘Locomotor System’,bleeding:‘Bleeding Disorders’
};
const sr = p.systemicReview||{};
const sn = p.systemicNotes||{};
const sysKeys = Object.keys(sysLabels);
const hasSR = sysKeys.some(k=>(sr[k]&&(sr[k].pos.length||sr[k].neg.length))||sn[k]);
if(hasSR){
html+=`<div class="card"><div class="case-section-title">SYSTEMIC REVIEW</div>`;
sysKeys.forEach(k=>{
const data=sr[k]||{pos:[],neg:[]};
const notes=sn[k]||’’;
if(!data.pos.length&&!data.neg.length&&!notes) return;
html+=`<div class="sys-block"><div class="sys-block-title">${sysLabels[k]}</div>`;
if(data.pos.length){
html+=`<div class="case-body" style="margin-bottom:4px"><span style="font-weight:600;color:var(--teal)">Positive: </span>`;
html+=data.pos.map(s=>`<span class="finding-pos">✓ ${s}</span>`).join(’  ’);
html+=`</div>`;
}
if(data.neg.length){
html+=`<div class="case-body" style="margin-bottom:4px"><span style="font-weight:600;color:var(--muted)">Negative: </span>`;
html+=data.neg.map(s=>`<span class="finding-neg">✗ ${s}</span>`).join(’  ’);
html+=`</div>`;
}
if(notes) html+=`<div class="case-body" style="font-style:italic;color:var(--muted)">${escHtml(notes)}</div>`;
html+=`</div>`;
});
html+=`</div>`;
}

/* ── Past History ── */
const ph=p.pastHistory||{};
if(ph.medical||ph.allergy||ph.immunisation||ph.ops||p.menstrualHistory||p.obstetricHistory){
html+=`<div class="card"><div class="case-section-title">PAST HISTORY</div><div class="case-body">`;
if(ph.medical) html+=`<p><b>Past Medical History:</b> ${escHtml(ph.medical)}</p>`;
if(ph.allergy) html+=`<p><b>Drug Allergy:</b> ${escHtml(ph.allergy)}</p>`;
if(ph.immunisation) html+=`<p><b>Immunisation Status:</b> ${escHtml(ph.immunisation)}</p>`;
if(ph.ops) html+=`<p><b>Operations / Accidents:</b> ${escHtml(ph.ops)}</p>`;
if(p.menstrualHistory) html+=`<p><b>Menstrual History:</b> ${escHtml(p.menstrualHistory)}</p>`;
if(p.obstetricHistory) html+=`<p><b>Obstetric History:</b> ${escHtml(p.obstetricHistory)}</p>`;
html+=`</div></div>`;
}

/* ── Family History ── */
if((p.familyHistory&&p.familyHistory.length)||p.familyHistoryDetails){
html+=`<div class="card"><div class="case-section-title">FAMILY HISTORY</div><div class="case-body">`;
if(p.familyHistory&&p.familyHistory.length)
html+=`<p>${p.familyHistory.map(h=>`<span class="dx-chip">${h}</span>`).join('')}</p>`;
if(p.familyHistoryDetails) html+=`<p>${escHtml(p.familyHistoryDetails)}</p>`;
html+=`</div></div>`;
}

/* ── Personal / Social / Dietary ── */
const ps=p.personalHistory||{};
const hasPS=ps.economic||ps.education||ps.familySize||ps.prevResidence||
(p.habits&&p.habits.length)||p.habitDetails||ps.dietType||ps.dietAdequacy||p.dietNotes;
if(hasPS){
html+=`<div class="card"><div class="case-section-title">PERSONAL, SOCIAL & DIETARY HISTORY</div><div class="case-body">`;
if(ps.economic||ps.education||ps.familySize||ps.prevResidence){
html+=`<p>`;
if(ps.economic) html+=`<b>Economic Status:</b> ${escHtml(ps.economic)}. `;
if(ps.education) html+=`<b>Education:</b> ${escHtml(ps.education)}. `;
if(ps.familySize) html+=`<b>Family:</b> ${escHtml(ps.familySize)}. `;
if(ps.prevResidence) html+=`<b>Residence/Travel:</b> ${escHtml(ps.prevResidence)}.`;
html+=`</p>`;
}
if(p.habits&&p.habits.length){
html+=`<p><b>Habits:</b> ${p.habits.join(', ')}`;
if(p.habitDetails) html+=` — ${escHtml(p.habitDetails)}`;
html+=`</p>`;
}
if(ps.dietType||ps.dietAdequacy||p.dietNotes){
html+=`<p><b>Diet:</b> ${[ps.dietType,ps.dietAdequacy].filter(Boolean).join(', ')}`;
if(p.dietNotes) html+=`. ${escHtml(p.dietNotes)}`;
html+=`</p>`;
}
html+=`</div></div>`;
}

/* ── General Examination ── */
const ge=p.generalExam||{};
const gef=p.genExamFindings||{pos:[],neg:[]};
html+=`<div class="card"><div class="case-section-title">GENERAL EXAMINATION</div>`;
// Vitals
const vitals=[[ge.pulse,‘Pulse’],[ge.bp,‘BP’],[ge.temp,‘Temperature’],[ge.rr,‘RR’],[ge.spo2,‘SpO₂’],[ge.weight,‘Weight/BMI’]].filter(v=>v[0]);
if(vitals.length){
html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">`;
vitals.forEach(([val,lbl])=>{
html+=`<div style="background:var(--bg);border-radius:8px;padding:8px 10px;border:1px solid var(--border)"><div style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${lbl}</div><div style="font-weight:600;font-size:.9rem;margin-top:2px">${escHtml(val)}</div></div>`;
});
html+=`</div>`;
}
html+=`<div class="case-body">`;
if(ge.consciousness) html+=`<p><b>Consciousness:</b> ${escHtml(ge.consciousness)}</p>`;
if(ge.build) html+=`<p><b>Build & Nutrition:</b> ${escHtml(ge.build)}</p>`;
// Positive findings first
if(gef.pos&&gef.pos.length)
html+=`<p><b>Present:</b> ${gef.pos.map(s=>`<span class="finding-pos">✓ ${s}</span>`).join(' ')}</p>`;
if(gef.neg&&gef.neg.length)
html+=`<p><b>Absent:</b> ${gef.neg.map(s=>`<span class="finding-neg">✗ ${s}</span>`).join(' ')}</p>`;
if(ge.lymphDetails) html+=`<p><b>Lymphadenopathy:</b> ${escHtml(ge.lymphDetails)}</p>`;
if(ge.oedemaDetails) html+=`<p><b>Oedema:</b> ${escHtml(ge.oedemaDetails)}</p>`;
if(ge.notes) html+=`<p>${escHtml(ge.notes)}</p>`;
html+=`</div></div>`;

/* ── Systemic Examination ── */
const se=p.sysExam||{};
const hasCSE=Object.values(se).some(v=>v&&v.trim());
if(hasCSE){
html+=`<div class="card"><div class="case-section-title">SYSTEMIC EXAMINATION</div>`;
const seBlocks=[
[‘🫀 Cardiovascular System’,[
[‘Pulse / JVP / Carotid’,se.cvsPulse],
[‘Precordium (Inspection/Palpation)’,se.cvsPrecordium],
[‘Auscultation’,se.cvsAuscult],
]],
[‘🫁 Respiratory System’,[
[‘Inspection / Palpation / Percussion’,se.respIPP],
[‘Auscultation’,se.respAuscult],
]],
[‘🫃 Abdomen’,[
[‘Inspection / Auscultation’,se.abdInsp],
[‘Palpation’,se.abdPalp],
[‘Percussion’,se.abdPerc],
[‘Rectal/Vaginal’,se.rectal],
]],
[‘🧠 Nervous System’,[
[‘Higher Functions’,se.cnsHigher],
[‘Cranial Nerves’,se.cnsCranial],
[‘Motor System’,se.cnsMotor],
[‘Reflexes’,se.cnsReflexes],
[‘Sensory System’,se.cnsSensory],
[‘Cerebellar/Extrapyramidal/Meningeal’,se.cnsOther],
]],
];
seBlocks.forEach(([sysTitle, fields])=>{
const hasAny=fields.some(([,v])=>v&&v.trim());
if(!hasAny) return;
html+=`<div class="sys-block"><div class="sys-block-title">${sysTitle}</div><div class="case-body">`;
fields.forEach(([lbl,val])=>{
if(val&&val.trim()) html+=`<p><b>${lbl}:</b> ${escHtml(val).replace(/\n/g,'<br/>')}</p>`;
});
html+=`</div></div>`;
});
html+=`</div>`;
}

/* ── Investigations ── */
if(p.investigations){
html+=`<div class="card"><div class="case-section-title">INVESTIGATIONS</div><div class="case-body">${escHtml(p.investigations).replace(/\n/g,'<br/>')}</div></div>`;
}

/* ── Diagnosis ── */
const dx=p.diagnosis||{};
html+=`<div class="card"><div class="case-section-title">DIAGNOSIS</div><div class="case-body">`;
if(dx.provisional) html+=`<div class="sys-block"><div class="sys-block-title">Provisional Diagnosis</div><p>${escHtml(dx.provisional).replace(/\n/g,'<br/>')}</p></div>`;
if(p.ddx&&p.ddx.length){
html+=`<div class="sys-block"><div class="sys-block-title">Differential Diagnoses</div><ol style="padding-left:18px">`;
p.ddx.forEach(d=>html+=`<li>${escHtml(d)}</li>`);
html+=`</ol></div>`;
}
if(dx.final) html+=`<div class="sys-block"><div class="sys-block-title" style="color:var(--teal)">✅ Final Diagnosis</div><p style="font-weight:600;font-size:1rem">${escHtml(dx.final).replace(/\n/g,'<br/>')}</p></div>`;
html+=`</div></div>`;

/* ── Footer ── */
html+=`<div class="card" style="text-align:center;color:var(--muted);font-size:.75rem;padding:12px">
Case recorded: ${new Date(p.updatedAt||p.createdAt||Date.now()).toLocaleString(‘en-IN’)}  ·  ClinCase App

  </div>`;

return html;
}

function kv(label,value){
if(!value) return ‘’;
return `<span class="case-kv"><b>${label}:</b> ${escHtml(value)}</span>`;
}

function escHtml(str){
if(!str) return ‘’;
return String(str).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}

/* ════════════════════════════════════════════════════════
INIT
════════════════════════════════════════════════════════ */
updateHomeCounts();
</script>
